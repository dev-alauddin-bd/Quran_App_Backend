openapi: 3.0.0

info:
  title: Quran API
  version: 1.0.0
  description: REST API for Surahs and Ayahs with search functionality

servers:
  - url: http://localhost:5000

paths:
  /api/surahs:
    get:
      summary: Get all surahs
      tags:
        - Surahs
      responses:
        "200":
          description: List of all surahs

  /api/surahs/{id}:
    get:
      summary: Get single surah by ID
      tags:
        - Surahs
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Surah ID
      responses:
        "200":
          description: Surah details
        "404":
          description: Surah not found

  /api/search:
    get:
      summary: Search ayahs by translation text
      tags:
        - Search
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: Search keyword
      responses:
        "200":
          description: Search results
        "400":
          description: Query is required